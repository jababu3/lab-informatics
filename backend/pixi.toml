[workspace]
name = "lab-backend"
authors = ["Lab Informatics Team"]
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

[dependencies]
python = "3.11.*"
fastapi = ">=0.104.1"
uvicorn = ">=0.24.0"
pydantic = ">=2.9.0,<3.0.0"
pymongo = ">=4.6.0"
psycopg2 = ">=2.9.9"
rdkit = ">=2023.3"
numpy = ">=1.24,<2"
pandas = ">=2.0.3"
scipy = ">=1.11.3"
scikit-learn = ">=1.3.2"
python-multipart = ">=0.0.9"
python-dotenv = ">=1.0.0"
requests = ">=2.31.0"
pint = ">=0.23"
sqlalchemy = ">=2.0.23"
bcrypt = "<4.0.0"
python-jose = ">=3.3.0"
passlib = ">=1.7.4"
cryptography = "*"

[pypi-dependencies]
ollama = "==0.4.7"
slowapi = ">=0.1.9"

[tasks]
start = "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
seed = "python scripts/seed_data.py"
